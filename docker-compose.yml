services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://fairorder:fairorder@db:5432/fairorder"
      EMAIL_PROVIDER: "smtp"
      SMTP_HOST: "mailpit"
      SMTP_PORT: "1025"
      SMTP_FROM: "noreply@fairorder.local"
      MAGIC_LINK_BASE_URL: "http://localhost:3000"
      NEXT_PUBLIC_SITE_URL: "http://localhost:3000"
      NEXT_PUBLIC_APP_URL: "http://localhost:3000"
      STORAGE_PROVIDER: "minio"
      MINIO_ENDPOINT: "http://minio:9000"
      MINIO_ACCESS_KEY: "fairorder"
      MINIO_SECRET_KEY: "fairorder"
      MINIO_BUCKET: "fairorder-images"
      NEXT_PUBLIC_MINIO_URL: "http://localhost:9000"
      DB_HOST: "db"
      DB_PORT: "5432"
      DB_USER: "fairorder"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: fairorder
      POSTGRES_PASSWORD: fairorder
      POSTGRES_DB: fairorder
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fairorder"]
      interval: 2s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: fairorder
      MINIO_ROOT_PASSWORD: fairorder
    volumes:
      - minio-data:/data

  minio-setup:
    image: minio/mc
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 2;
      mc alias set local http://minio:9000 fairorder fairorder;
      mc mb --ignore-existing local/fairorder-images;
      mc anonymous set download local/fairorder-images;
      "

  mailpit:
    image: axllent/mailpit
    ports:
      - "8025:8025"
      - "1025:1025"
    profiles:
      - mail

volumes:
  pgdata:
  minio-data:
